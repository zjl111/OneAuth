# OneAuth 外网反向代理 — 部署到 fit2cloud nginx
# 文件路径建议：/opt/fit2cloud/nginx/conf.d/oneauth.conf
#
# 内网服务：10.1.14.102:80 上已有一层 nginx，
# 把 /api/ /oauth/ /.well-known/ 转给 backend，其它路径走 SPA。
# 这里只做一层公网入口，单端口反代过去即可。

# 强制 HTTPS：80 跳 443
server {
    listen 80;
    listen [::]:80;
    server_name wg.fit2cloud.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wg.fit2cloud.cn;

    ssl_certificate     /opt/fit2cloud/nginx/certs/ssl_fit2cloud_nginx/fit2cloud_nginx.crt;
    ssl_certificate_key /opt/fit2cloud/nginx/certs/ssl_fit2cloud_nginx/fit2cloud.key;
    ssl_session_cache   shared:SSL_oneauth:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 安全头（注意 X-Frame-Options 与登录页 iframe 行为，按需调整）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 文件上传 / SAML metadata 可能大点
    client_max_body_size 10m;

    # 反代到内网 nginx（OneAuth docker compose 暴露的 80 端口）
    location / {
        proxy_pass         http://10.1.14.102:80;
        proxy_http_version 1.1;

        # 关键：原始 Host / 协议 / 客户端 IP，OneAuth 才能正确生成回调链接 + 命中 CORS
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket / SSE 兼容（OneAuth 本身没用到，但留着省心）
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # 长轮询 / 后端慢请求时不要 504
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
    }
}
