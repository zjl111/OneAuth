<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="folderBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfd2ff"/>
      <stop offset="100%" stop-color="#9eb6ff"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce6ff"/>
      <stop offset="100%" stop-color="#aebfff"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6efff"/>
    </linearGradient>
  </defs>

  <!-- decorative dots -->
  <circle cx="40"  cy="32" r="2.4" fill="#cfd9ff"/>
  <circle cx="158" cy="30" r="2.2" fill="#cfd9ff"/>
  <circle cx="170" cy="46" r="1.6" fill="#dde5ff"/>
  <circle cx="90"  cy="22" r="1.6" fill="#dde5ff"/>

  <!-- leaves -->
  <path d="M48 142 q-10 -28 12 -42 q4 18 -12 42z" fill="#c5dccc" opacity="0.85"/>
  <path d="M156 142 q10 -28 -12 -42 q-4 18 12 42z" fill="#c5dccc" opacity="0.85"/>

  <!-- folder back -->
  <path d="M60 60 h28 l10 10 h44 a8 8 0 0 1 8 8 v60 a8 8 0 0 1 -8 8 H60 a8 8 0 0 1 -8 -8 V68 a8 8 0 0 1 8 -8z" fill="url(#folderBack)"/>

  <!-- folder front -->
  <path d="M56 86 h88 a8 8 0 0 1 8 8 v44 a8 8 0 0 1 -8 8 H56 a8 8 0 0 1 -8 -8 V94 a8 8 0 0 1 8 -8z" fill="url(#folderFront)"/>

  <!-- cloud + arrow -->
  <g transform="translate(72 92)">
    <path d="M14 28 a14 14 0 0 1 14 -14 q2 -10 14 -10 q12 0 13 11 a11 11 0 0 1 -3 22 H16 a14 14 0 0 1 -2 -9z" fill="url(#cloud)" stroke="#b9c8ff" stroke-width="1.2"/>
    <path d="M28 24 v18 M22 30 l6 -6 l6 6" stroke="#5a7dff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
